<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1a1a1a;background:#fff;padding:20px;max-width:800px}
.nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.nb{padding:5px 11px;border-radius:20px;border:1px solid #ddd;background:#f5f5f5;font-size:11px;cursor:pointer;color:#666;transition:all .15s}
.nb:hover,.nb.on{background:#fff;color:#111;border-color:#999;font-weight:500}
.prog-bar{height:3px;background:#eee;border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;border-radius:2px;background:#111;transition:width .3s}
.prog-lbl{font-size:11px;color:#999;text-align:right;margin-bottom:14px}
.ph-head{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border-radius:10px;border:1px solid #eee;background:#f9f9f9;margin-bottom:12px}
.ph-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ph-title{font-size:15px;font-weight:500;margin-bottom:3px}
.ph-goal{font-size:12px;color:#666;line-height:1.5}
.slbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:7px;margin-top:12px}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.pb{background:#e8f0fe;color:#1a73e8}.pg{background:#e6f4ea;color:#137333}.pa{background:#fef7e0;color:#b06000}.pr{background:#fce8e6;color:#c5221f}.pn{background:#f1f1f1;color:#555;border:1px solid #ddd}
.steps{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.step{display:flex;gap:9px;align-items:flex-start;padding:9px 12px;border-radius:8px;background:#fff;border:1px solid #eee;font-size:12px;line-height:1.55}
.snum{font-size:10px;font-weight:500;min-width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:#f1f1f1;color:#555}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.card{background:#fff;border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:7px}
.ct{font-size:12px;font-weight:500;margin-bottom:4px}
.cb{font-size:11px;color:#666;line-height:1.55}
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:7px;margin-bottom:10px}
.tc{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:8px 10px}
.tn{font-size:12px;font-weight:500;margin-bottom:2px}
.tu{font-size:11px;color:#666}
.rule{border-left:2px solid #666;padding:9px 12px;margin-bottom:10px;background:#f9f9f9;border-radius:0 8px 8px 0;font-size:12px;color:#555;line-height:1.6}
.rule strong{color:#111;font-weight:500}
.warn{border:1px solid #f5c518;background:#fffbe6;padding:9px 12px;border-radius:8px;font-size:12px;color:#7d5a00;line-height:1.6;margin-bottom:10px}
.foot{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #eee}
.fb{padding:6px 14px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;font-size:12px;cursor:pointer;color:#555;transition:all .15s}
.fb:hover{background:#fff;color:#111}
.fb.pri{background:#111;color:#fff;border-color:#111}
.fb.pri:hover{opacity:.85}
.fb:disabled{opacity:.35;cursor:default}
</style>
</head>
<body>
<div class="nav" id="nav"></div>
<div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
<div class="prog-lbl" id="plbl"></div>
<div id="panel"></div>
<div class="foot"><button class="fb" id="pb" onclick="move(-1)">← Previous</button><button class="fb pri" id="nb2" onclick="move(1)">Next →</button></div>
<script>
const P=[
{lbl:"0 — Mindset",icon:"🧠",bg:"#EEF2FF",title:"Phase 0: The AI-native mindset shift",goal:"Before anything else — understand how AI products are fundamentally different from traditional software. This shapes every decision from here.",pills:[{t:"Non-deterministic output",c:"pb"},{t:"Probabilistic quality",c:"pb"},{t:"Loop, not waterfall",c:"pg"},{t:"Judgment > capacity",c:"pn"},{t:"Ship behavior, not features",c:"pa"}],steps:[{n:"—",t:"Old constraint: engineering capacity. New constraint: judgment — knowing what to build and why. Code is nearly free. Good decisions are not."},{n:"—",t:"AI output is non-deterministic. Same input can produce different output every time. You don't fix this — you design around it with evals and fallbacks."},{n:"—",t:"Two unique challenges: (1) non-determinism — you can't predict input OR output behavior; (2) the agency-control trade-off — every time you give AI more autonomy, you give up control."},{n:"—",t:"The role shifts from orchestrator to full-stack operator. PMs now own behavior design, eval rubrics, data strategy, and failure modes — not just the feature roadmap."},{n:"—",t:"The lifecycle is a loop: define outcome → shape behavior → define quality → design for failure → launch → collect feedback → calibrate → repeat."}],lc:"Traditional PM vs AI PM",li:[{t:"Traditional PM",b:"Write spec → hand off → wait → ship. Linear. Deterministic. PM = coordinator."},{t:"AI PM",b:"Prototype → define behavior + evals → ship with feedback loops → iterate forever. PM = full-stack operator."}],rc:"What every AI product is built on",ri:[{t:"User outcome",b:"What job is the user trying to get done?"},{t:"Model behavior",b:"How should the AI act — tone, constraints, escalation, refusal."},{t:"Evaluation",b:"How do you prove it's good enough before and after launch?"},{t:"Recovery",b:"What happens when the AI is wrong, slow, or uncertain?"}],tl:null,tools:[],rule:"<strong>The 40x compression:</strong> What used to take two weeks — spec → design → mock → engineer → ship — now takes two hours. That changes what's worth building, how fast you decide, and how much process is actually useful.",warn:null},
{lbl:"1 — Problem",icon:"🔍",bg:"#FEF3C7",title:"Phase 1: Find the right problem",goal:"AI makes building the wrong thing faster too. Problem selection is now the primary differentiator between great and mediocre AI teams.",pills:[{t:"Problem statement",c:"pb"},{t:"User + task definition",c:"pb"},{t:"AI suitability check",c:"pg"},{t:"Failure map",c:"pa"},{t:"Validation list",c:"pn"}],steps:[{n:"1",t:"Start with user pain, not model capabilities. Ask: where do users lose time, confidence, or quality at scale?"},{n:"2",t:"Run the Mega-Trend Check: are you solving a foundational shift or a temporary interface improvement that a base model update will eliminate in 6 months?"},{n:"3",t:"Define the Reason to Win: in AI, your moat isn't the code. It's unique data access, distribution, or a domain world model nobody else can replicate."},{n:"4",t:"Identify the specific task in a specific context — not a vague persona. 'CFO reviewing monthly variance reports' beats 'finance professionals'."},{n:"5",t:"Build a Validation Roadmap instead of a feature list: 5-10 hypotheses to prove (e.g. 'Can we cut manual task time by 50%?')."},{n:"6",t:"Test desirability with real humans — 6 people in your ICP is enough. AI compresses analysis time; use that to do more interviews, not fewer."},{n:"7",t:"Know when NOT to interview: for genuinely novel AI capabilities, customers can't articulate needs for things they've never experienced. Use builder intuition."}],lc:"Good AI problem signals",li:[{t:"High volume + repetitive",b:"AI leverage compounds with frequency. The more it happens, the bigger the value."},{t:"Language-heavy or ambiguous",b:"Human language, judgment, or interpretation required — not just deterministic logic."},{t:"Recoverable failure",b:"If the AI is wrong, the user can catch and correct it. Stakes are manageable."},{t:"Data flywheel possible",b:"You can collect corrections and feedback to improve the model over time. Without this, no moat."}],rc:"Bad AI problem signals",ri:[{t:"Rules would work fine",b:"If a simple if/else tree solves it, don't use AI. It's overengineering with extra cost."},{t:"Base model cannibalizes you",b:"If GPT-5 / Claude can do 90% of your value prop tomorrow, stop and move closer to the hard parts."},{t:"Catastrophic if wrong",b:"One AI error causes irreversible damage — the bar becomes extremely high."},{t:"Illegible but energetic",b:"Some best ideas can't survive traditional screening. If builders are excited but can't explain it — prototype first, justify later."}],tl:"Workflow tools",tools:[{n:"Claude / ChatGPT",u:"Synthetic user research — simulate top complaints of competitors"},{n:"Reddit / X search",u:"Find real unmet needs in your target space"},{n:"6-user interviews",u:"ICP conversations — Rule of Six for pattern discovery"},{n:"Notion",u:"Log problem hypotheses, evidence, and validation status"},{n:"Spreadsheet",u:"Validation roadmap — list of hypotheses not features"}],rule:"<strong>The desirability paradox:</strong> AI compresses feasibility, viability, and usability risk dramatically. But desirability risk is unchanged. No synthetic research replaces watching a real person struggle with your product. When 3 of 4 risks get cheap, the remaining one becomes the differentiator.",warn:"35% of startups fail from 'no market need'. That number doesn't shrink with AI — it gets worse. You can now build the wrong thing in a weekend instead of a quarter. Speed creates an illusion of progress."},
{lbl:"2 — Shape",icon:"✏️",bg:"#ECFDF5",title:"Phase 2: Shape the product + spec the behavior",goal:"Define what the AI should do, how it should behave, and what 'good' looks like — before writing a single line of code.",pills:[{t:"Behavior spec",c:"pb"},{t:"Prompt/policy spec",c:"pb"},{t:"Eval plan",c:"pg"},{t:"Golden dataset (20-50 pairs)",c:"pa"},{t:"Failure mode map",c:"pr"}],steps:[{n:"1",t:"Define the core AI loop: input → AI action → output. Keep v1 to a single constrained loop — not a 5-step autonomous agent."},{n:"2",t:"Write the behavior spec: tone, constraints, when to refuse, when to escalate, what the AI should never do. This is the new PRD."},{n:"3",t:"Write the prompt/policy spec. PMs now own the system prompt — not just the feature requirement."},{n:"4",t:"Curate a golden dataset: 20-50 expected input/output pairs. This forces team alignment on what 'good' means before you build."},{n:"5",t:"Design eval dimensions: accuracy, tone, safety, latency, cost per call. Pick 3-5 that matter for this specific product."},{n:"6",t:"Map failure modes explicitly: hallucination, slow response, out-of-scope input, edge cases. Design safe failure first — if uncertain, AI says 'I don't know'."},{n:"7",t:"Use Claude to interrogate your own spec: ask it to find gaps, push back on assumptions, and simulate bad user inputs before you build."}],lc:"The new AI-native PRD",li:[{t:"System behavior spec",b:"How the AI acts: tone, constraints, escalation rules, refusal triggers. PMs write and own this."},{t:"Prompt / policy spec",b:"The actual system prompt and its logic. No longer optional for PMs."},{t:"Eval plan",b:"Which dimensions you measure. What threshold means 'ready to ship'."},{t:"Data plan",b:"Where training/feedback data comes from. How the flywheel builds over time."}],rc:"Agency-control ladder (start low)",ri:[{t:"V1: Human in the loop",b:"AI suggests, human approves. Logs correction data as flywheel for v2."},{t:"V2: Supervised automation",b:"AI acts, human can override. Flywheel builds from the overrides."},{t:"V3+: Higher autonomy",b:"Earned, not assumed. Expand only based on evidence from prior versions."}],tl:"Tools for this phase",tools:[{n:"Claude / AI Studio",u:"Draft + test system prompts before any engineering work"},{n:"Notion / Doc",u:"Write the behavior spec and eval plan"},{n:"Spreadsheet",u:"Curate golden dataset of expected I/O pairs"},{n:"Team session",u:"Golden dataset review surfaces misalignment early — biggest hidden value"}],rule:"<strong>The biggest hidden value of the golden dataset:</strong> It's as much about team alignment as it is about testing. Teams that skip it discover they were building different products when it's too late to fix cheaply.",warn:"Danger: Building a 5-step autonomous agent as your v1. Companies that did this had to shut products down. Air Canada's agent hallucinated a refund policy and had to honor it legally. Start with one constrained loop."},
{lbl:"3 — Prototype",icon:"⚡",bg:"#F0FDF4",title:"Phase 3: Agentic prototyping",goal:"Build a working prototype yourself in hours, not weeks. The prototype is your new PRD. Show, don't spec.",pills:[{t:"Working prototype",c:"pg"},{t:"Refined prompt design",c:"pb"},{t:"Engineer alignment",c:"pn"},{t:"Initial user signal",c:"pa"}],steps:[{n:"1",t:"Build it yourself first. Use Cursor, v0.dev, Replit, Make, or n8n. Don't wait for an engineering sprint."},{n:"2",t:"Focus 70% on the core AI loop output — does it have the right taste and judgment? UI is 30% at this stage."},{n:"3",t:"Use the /exploration-phase command: instruct the AI to read full context and ask tough questions BEFORE writing code. Prevents expensive rethinks."},{n:"4",t:"Use /create-plan to generate a plan.md file with status trackers. Becomes the source of truth across models — Cursor for UI, Claude Code for backend."},{n:"5",t:"The Builder PM path: n8n / Langflow (learn agent anatomy visually) → Cursor / v0.dev (faster prototyping) → Claude Code + MCP (production-grade agentic workflows)."},{n:"6",t:"Bring engineers in to debate the prototype — not a deck. 'Here's what I built, what's feasible?' closes the alignment gap faster than any written spec."},{n:"7",t:"Upload a screenshot of a product you like and say 'replicate this design style' to unblock design direction in minutes."}],lc:"Old vs new workflow",li:[{t:"Old workflow",b:"Idea → PRD → review rounds → engineering sprint → prototype. Weeks of lag before anyone sees anything real."},{t:"New workflow",b:"Idea → prototype in hours → debate on the real thing → PRD only for complex cross-functional cases."},{t:"The plan.md file",b:"Replaces the PRD in agentic workflows. Tracks phase completion so any model can pick it up mid-run."}],rc:"The /command system",ri:[{t:"/exploration-phase",b:"Force AI to ask tough questions before writing any code. Prevents building the wrong thing."},{t:"/create-plan",b:"Generate plan.md with status trackers across all tasks."},{t:"/create-issue",b:"Log bugs or ideas to Linear via MCP without leaving your flow."},{t:"/learning-opportunity",b:"Explain current code in plain language using the 80/20 rule."}],tl:"Prototyping toolkit",tools:[{n:"Cursor",u:"AI code editor — build full apps with natural language"},{n:"v0.dev",u:"Vercel's UI generator — frontend in minutes"},{n:"n8n / Langflow",u:"Visual agent builder — learn agent anatomy no-code"},{n:"Make",u:"No-code automation — wire AI nodes without writing code"},{n:"Claude Code",u:"Terminal agent — high-agency coding + MCP connections"},{n:"AI Studio",u:"Test prompts and agent behavior before building"}],rule:"<strong>Engineer buy-in shift:</strong> Engineers are easier to persuade when they can see and touch a prototype. 'Here's what I built, what do you think is feasible?' lands better than any 10-page spec. The prototype is the conversation starter.",warn:null},
{lbl:"4 — Build & Eval",icon:"🔧",bg:"#FFF7ED",title:"Phase 4: Technical build + evaluation",goal:"Build the real system with evals, observability, and a data flywheel baked in from day one — not retrofitted after launch.",pills:[{t:"Deployed system",c:"pg"},{t:"Eval framework + baselines",c:"pb"},{t:"Observability dashboard",c:"pb"},{t:"Safe failure design",c:"pa"},{t:"CCCD loop running",c:"pg"}],steps:[{n:"1",t:"Decide the stack: RAG (Retrieval-Augmented Generation) for accuracy and data freshness, or fine-tuning for style and tone. Most v1 products start with RAG."},{n:"2",t:"Set up evals BEFORE shipping. You need a quantitative answer to 'is model B better than A for our use case?' — not a gut feeling."},{n:"3",t:"Instrument everything from day one: log inputs, outputs, latency, token cost, user corrections, override rate. These are training signals for v2."},{n:"4",t:"Design safe failure explicitly: if uncertain, the AI says 'I don't know' and hands off to a human — never hallucinate confidently."},{n:"5",t:"Monitor token consumption like a business metric — it IS your COGS. Model what happens to unit economics if usage grows 10x before you scale."},{n:"6",t:"Run the CCCD loop: Continuous Development (scope → curate → set metrics → deploy) + Continuous Calibration (analyze unexpected behavior → fix → update evals → repeat)."},{n:"7",t:"PM workflow in Claude Code + MCP: chart analysis → automated dashboard reports → feedback synthesis → insights-to-PRD → push to Linear. All in one terminal."}],lc:"The CCCD loop",li:[{t:"Continuous Development",b:"Scope capability → curate expected I/O data → set eval metrics → deploy."},{t:"Continuous Calibration",b:"Analyze unexpected production behavior → spot new error patterns → fix → update evals → loop back."},{t:"Why evals aren't enough alone",b:"Eval metrics only catch errors you already know about. Calibration catches emerging patterns that appear only after real users touch the system."}],rc:"Eval dimensions to track",ri:[{t:"Quality evals",b:"Accuracy, completeness, tone, safety — graded against your golden dataset."},{t:"Business evals",b:"Token cost per call, latency p95, error rate, human override rate."},{t:"Emerging pattern evals",b:"New failure types that appeared post-launch and weren't in your original eval plan."}],tl:"Build-phase tools",tools:[{n:"RAG stack",u:"Vector DB + retrieval layer for grounded, accurate output"},{n:"LangSmith / Braintrust",u:"Eval tracking and trace logging"},{n:"Helicone / LangFuse",u:"LLM observability — token cost, latency, errors"},{n:"Claude Code + MCP",u:"PM analytical workflows: charts → PRD → Linear in one terminal"},{n:"Amplitude MCP",u:"Connect product analytics directly to Claude Code for insight-to-spec pipeline"},{n:"Notion / Sheet",u:"Track error patterns and calibration log"}],rule:"<strong>5 PM workflows in Claude Code + MCP:</strong> (1) Drop chart URL → get insight in 90s. (2) Monday morning dashboard brief written overnight. (3) Zendesk + Gong + Slack → one weekly feedback report. (4) Analysis → spec draft in under 2 min. (5) Push to Linear or Jira via MCP without leaving Claude Code.",warn:"The Challenger Disaster warning: anticipate failure before launch. Design the failure mode first, then the happy path. Token cost is COGS — model your unit economics before you scale."},
{lbl:"5 — Launch & Grow",icon:"🚀",bg:"#F0F9FF",title:"Phase 5: Launch + growth flywheel",goal:"Ship safely, build the data flywheel, and use AI to power your own distribution — not just the product.",pills:[{t:"DAU / activation rate",c:"pb"},{t:"Override / correction rate",c:"pa"},{t:"Token cost per user",c:"pa"},{t:"Flywheel velocity",c:"pg"},{t:"Features killed ratio",c:"pn"}],steps:[{n:"1",t:"Launch safe first: closed beta with a small trusted group. Refine evals and observe real behavior before going public."},{n:"2",t:"Prioritize the data flywheel over new features: every human correction, override, and thumbs-down is a training data point for v2. This is your moat compounding."},{n:"3",t:"Use AI to automate your own growth: SEO content generation, onboarding personalization, experiment design. The product should feed its own distribution."},{n:"4",t:"Target log-linear growth, not linear. In AI-native products, the curve bends sharply once the flywheel activates — look for that inflection point."},{n:"5",t:"Build in public if you can: daily build updates, metrics shared openly. Community becomes both a feedback loop and a growth channel."},{n:"6",t:"Kill things fast. If a feature isn't moving after real usage, remove it. Willingness to deprioritize is a trust signal to leadership."},{n:"7",t:"Treat internal stakeholders like users: align launch metrics with their specific goals — board pressure, ARR targets, team OKRs. Executive buy-in is a product problem."}],lc:"The AI growth flywheel",li:[{t:"Users interact → data collected",b:"Every correction, override, and feedback signal is a training data point. Flywheel starts from launch day."},{t:"Better model → better product",b:"Each calibration round improves quality, improving retention and word of mouth without new feature spend."},{t:"Distribution via AI",b:"Use your own AI to generate the content, onboarding, and experiments that bring in the next user."}],rc:"Build-in-public playbook",ri:[{t:"The tweet-jacking move",b:"Watch viral tweets expressing needs in your space. Build that feature overnight and reply. Peak finance app got explosive downloads this way."},{t:"Daily build updates",b:"Share what you built, what broke, what you learned. Community becomes your highest-quality feedback loop."},{t:"Meme + insight mix",b:"Alternate between product insights and relatable content. Peak grew from 0 to thousands with zero existing audience."}],tl:"Growth toolkit",tools:[{n:"Make / Zapier",u:"Automate feedback collection, tagging, routing to data store"},{n:"PostHog / Mixpanel",u:"Behavioral analytics — track where users succeed and drop off"},{n:"Notion + AI",u:"Auto-generate weekly product updates from usage logs"},{n:"Claude Code",u:"Self-automate: generate content, run experiments, draft docs from your own product data"},{n:"Build-in-public",u:"Twitter/X daily updates — community as growth + feedback flywheel"}],rule:"<strong>The moat that compounds:</strong> Your data flywheel IS your moat. Every user correction makes the model better. Every improvement increases retention. Every retained user generates more corrections. Competitors can copy your UI — they cannot copy 6 months of domain-specific correction data.",warn:null}
];
let cur=0;
function ren(){
  document.getElementById('nav').innerHTML=P.map((p,i)=>`<button class="nb ${i===cur?'on':''}" onclick="go(${i})">${p.lbl}</button>`).join('');
  const pct=Math.round(cur/(P.length-1)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('plbl').textContent='Phase '+cur+' of '+(P.length-1);
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb2').disabled=cur===P.length-1;
  const p=P[cur];
  document.getElementById('panel').innerHTML=`
  <div class="ph-head"><div class="ph-icon" style="background:${p.bg}">${p.icon}</div><div><div class="ph-title">${p.title}</div><div class="ph-goal">${p.goal}</div></div></div>
  <div class="slbl">Key outputs</div><div class="pills">${p.pills.map(pl=>`<span class="pill ${pl.c}">${pl.t}</span>`).join('')}</div>
  <div class="slbl">Workflow — step by step</div><ul class="steps">${p.steps.map(s=>`<li class="step"><span class="snum">${s.n}</span><span>${s.t}</span></li>`).join('')}</ul>
  <div class="cols"><div><div class="slbl">${p.lc}</div>${p.li.map(it=>`<div class="card"><div class="ct">${it.t}</div><div class="cb">${it.b}</div></div>`).join('')}</div><div><div class="slbl">${p.rc}</div>${p.ri.map(it=>`<div class="card"><div class="ct">${it.t}</div><div class="cb">${it.b}</div></div>`).join('')}</div></div>
  ${p.tl?`<div class="slbl">${p.tl}</div><div class="tgrid">${p.tools.map(t=>`<div class="tc"><div class="tn">${t.n}</div><div class="tu">${t.u}</div></div>`).join('')}</div>`:''}
  ${p.rule?`<div class="rule">${p.rule}</div>`:''}
  ${p.warn?`<div class="warn">${p.warn}</div>`:''}`;
}
function go(i){cur=i;ren();}
function move(d){go(Math.max(0,Math.min(P.length-1,cur+d)))}
ren();
</script>
</body>
</html>
